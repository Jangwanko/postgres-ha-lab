name: HA CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  compose-ha-test:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Compose 기동
        run: docker compose up -d

      - name: HA 종단 간 테스트
        run: bash scripts/failover-test.sh

      - name: 운영 지표 측정 (3회)
        run: bash scripts/measure-ha-metrics.sh 3

      - name: Compose 로그 수집
        if: always()
        run: docker compose logs > reports/compose.log || true

      - name: 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha-test-reports
          path: |
            reports/ha-metrics.json
            reports/ha-metrics.md
            reports/compose.log

      - name: 정리
        if: always()
        run: docker compose down -v
