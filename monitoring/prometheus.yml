global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/postgres-ha-rules.yml

scrape_configs:
  - job_name: postgres-node1
    static_configs:
      - targets: ["postgres-exporter-node1:9187"]
        labels:
          cluster: postgres-ha-lab
          node: pg-node-1

  - job_name: postgres-node2
    static_configs:
      - targets: ["postgres-exporter-node2:9187"]
        labels:
          cluster: postgres-ha-lab
          node: pg-node-2

  - job_name: postgres-node3
    static_configs:
      - targets: ["postgres-exporter-node3:9187"]
        labels:
          cluster: postgres-ha-lab
          node: pg-node-3
