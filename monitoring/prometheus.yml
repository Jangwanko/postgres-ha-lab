global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'postgres_primary'
    static_configs:
      - targets: ['postgres-exporter-primary:9187']

  - job_name: 'postgres_replica'
    static_configs:
      - targets: ['postgres-exporter-replica:9187']

  - job_name: 'ha_metrics'
    static_configs:
      - targets: ['ha-metrics-exporter:9100']
