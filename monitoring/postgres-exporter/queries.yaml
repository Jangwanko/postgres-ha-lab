pg_replication_replay_lag:
  query: |
    SELECT
      CASE
        WHEN pg_is_in_recovery() AND pg_last_xact_replay_timestamp() IS NOT NULL
          THEN EXTRACT(EPOCH FROM now() - pg_last_xact_replay_timestamp())
        ELSE 0
      END AS lag_seconds
  metrics:
    - lag_seconds:
        usage: "GAUGE"
        description: "Replica replay lag in seconds"

pg_node_role:
  query: |
    SELECT CASE WHEN pg_is_in_recovery() THEN 1 ELSE 0 END AS is_replica
  metrics:
    - is_replica:
        usage: "GAUGE"
        description: "1 when the node is a replica, 0 when the node is primary"
