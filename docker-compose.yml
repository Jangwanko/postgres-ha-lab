  pgpool:
    image: mrgreen007/pgpool:4.6.4
    container_name: pgpool
    restart: unless-stopped
    depends_on:
      - pg-node-1
      - pg-node-2
      - pg-node-3
    environment:
      PGPOOL_BACKEND_NODES: 0:pg-node-1:5432,1:pg-node-2:5432,2:pg-node-3:5432
      PGPOOL_ENABLE_LOAD_BALANCING: "yes"
      PGPOOL_SR_CHECK_USER: postgres
      PGPOOL_SR_CHECK_PASSWORD: postgres
      PGPOOL_HEALTH_CHECK_USER: postgres
      PGPOOL_HEALTH_CHECK_PASSWORD: postgres
      PGPOOL_POSTGRES_USERNAME: postgres
      PGPOOL_POSTGRES_PASSWORD: postgres
      PGPOOL_POSTGRES_CUSTOM_USERS: appuser
      PGPOOL_POSTGRES_CUSTOM_PASSWORDS: appuserpass
      PGPOOL_ADMIN_USERNAME: admin
      PGPOOL_ADMIN_PASSWORD: adminpass
    ports:
      - "5432:5432"
      - "9898:9898"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ': > /dev/tcp/127.0.0.1/5432'"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pg-ha

  postgres-exporter-node1:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: pg_exporter_node1
    restart: unless-stopped
    depends_on:
      - pg-node-1
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@pg-node-1:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
      - ./monitoring/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    networks:
      - pg-ha

  postgres-exporter-node2:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: pg_exporter_node2
    restart: unless-stopped
    depends_on:
      - pg-node-2
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@pg-node-2:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
