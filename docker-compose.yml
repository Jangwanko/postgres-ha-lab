services:
  primary:
    image: postgres:15
    container_name: pg_primary
    restart: unless-stopped
    environment:
      NODE_NAME: primary
      PEER_NODE: replica
      STATE_FILE: /cluster-state/current_primary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./scripts-fixed/postgres-ha-node.sh:/postgres-ha-node.sh:ro
      - ./cluster-state:/cluster-state
      - ./postgres/primary-init/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary-init/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./archive/wal_archive:/wal_archive
    command: bash /postgres-ha-node.sh
    ports:
      - "5432:5432"

  replica:
    image: postgres:15
    container_name: pg_replica
    restart: unless-stopped
    depends_on:
      - primary
    environment:
      NODE_NAME: replica
      PEER_NODE: primary
      STATE_FILE: /cluster-state/current_primary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./scripts-fixed/postgres-ha-node.sh:/postgres-ha-node.sh:ro
      - ./cluster-state:/cluster-state
      - ./postgres/primary-init/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary-init/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./archive/wal_archive:/wal_archive
    command: bash /postgres-ha-node.sh
    ports:
      - "5433:5432"

  failover-manager:
    image: docker:27-cli
    container_name: pg_failover_manager
    depends_on:
      - primary
      - replica
    volumes:
      - ./scripts-fixed/failover-manager.sh:/failover-manager.sh:ro
      - ./cluster-state:/cluster-state
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh /failover-manager.sh
    restart: unless-stopped

  postgres-exporter-primary:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pg_exporter_primary
    depends_on:
      - primary
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@primary:5432/postgres?sslmode=disable"
    restart: unless-stopped

  postgres-exporter-replica:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pg_exporter_replica
    depends_on:
      - replica
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@replica:5432/postgres?sslmode=disable"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    depends_on:
      - postgres-exporter-primary
      - postgres-exporter-replica
      - ha-metrics-exporter
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards

  ha-metrics-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: ha_metrics_exporter
    command:
      - "--collector.textfile.directory=/textfile"
    volumes:
      - ./reports-fixed:/textfile
    restart: unless-stopped

volumes:
  primary_data:
  replica_data:
