services:
  pg-node-1:
    image: soldevelo/postgresql-repmgr:latest
    container_name: pg_node1
    restart: unless-stopped
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_USERNAME: appuser
      POSTGRESQL_PASSWORD: appuserpass
      POSTGRESQL_DATABASE: appdb
      REPMGR_PASSWORD: repmgrpass
      REPMGR_PRIMARY_HOST: ${REPMGR_PRIMARY_HOST_NODE1:-pg-node-1}
      REPMGR_PARTNER_NODES: pg-node-1,pg-node-2,pg-node-3
      REPMGR_NODE_NAME: pg-node-1
      REPMGR_NODE_NETWORK_NAME: pg-node-1
      REPMGR_NODE_ID: "1"
      REPMGR_NODE_PRIORITY: "100"
      REPMGR_PORT_NUMBER: "5432"
      REPMGR_PRIMARY_PORT: "5432"
    volumes:
      - node1_data:/bitnami/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=postgres /opt/bitnami/postgresql/bin/pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pg-ha

  pg-node-2:
    image: soldevelo/postgresql-repmgr:latest
    container_name: pg_node2
    restart: unless-stopped
    depends_on:
      - pg-node-1
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_USERNAME: appuser
      POSTGRESQL_PASSWORD: appuserpass
      POSTGRESQL_DATABASE: appdb
      REPMGR_PASSWORD: repmgrpass
      REPMGR_PRIMARY_HOST: ${REPMGR_PRIMARY_HOST_NODE2:-pg-node-1}
      REPMGR_PARTNER_NODES: pg-node-1,pg-node-2,pg-node-3
      REPMGR_NODE_NAME: pg-node-2
      REPMGR_NODE_NETWORK_NAME: pg-node-2
      REPMGR_NODE_ID: "2"
      REPMGR_NODE_PRIORITY: "90"
      REPMGR_PORT_NUMBER: "5432"
      REPMGR_PRIMARY_PORT: "5432"
    volumes:
      - node2_data:/bitnami/postgresql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=postgres /opt/bitnami/postgresql/bin/pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pg-ha

  pg-node-3:
    image: soldevelo/postgresql-repmgr:latest
    container_name: pg_node3
    restart: unless-stopped
    depends_on:
      - pg-node-1
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_USERNAME: appuser
      POSTGRESQL_PASSWORD: appuserpass
      POSTGRESQL_DATABASE: appdb
      REPMGR_PASSWORD: repmgrpass
      REPMGR_PRIMARY_HOST: ${REPMGR_PRIMARY_HOST_NODE3:-pg-node-1}
      REPMGR_PARTNER_NODES: pg-node-1,pg-node-2,pg-node-3
      REPMGR_NODE_NAME: pg-node-3
      REPMGR_NODE_NETWORK_NAME: pg-node-3
      REPMGR_NODE_ID: "3"
      REPMGR_NODE_PRIORITY: "80"
      REPMGR_PORT_NUMBER: "5432"
      REPMGR_PRIMARY_PORT: "5432"
    volumes:
      - node3_data:/bitnami/postgresql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=postgres /opt/bitnami/postgresql/bin/pg_isready -h 127.0.0.1 -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pg-ha

  pgpool:
    image: mrgreen007/pgpool:4.6.4
    container_name: pgpool
    restart: unless-stopped
    depends_on:
      - pg-node-1
      - pg-node-2
      - pg-node-3
    environment:
      PGPOOL_BACKEND_NODES: 0:pg-node-1:5432,1:pg-node-2:5432,2:pg-node-3:5432
      PGPOOL_ENABLE_LOAD_BALANCING: "yes"
      PGPOOL_SR_CHECK_USER: postgres
      PGPOOL_SR_CHECK_PASSWORD: postgres
      PGPOOL_HEALTH_CHECK_USER: postgres
      PGPOOL_HEALTH_CHECK_PASSWORD: postgres
      PGPOOL_POSTGRES_USERNAME: postgres
      PGPOOL_POSTGRES_PASSWORD: postgres
      PGPOOL_POSTGRES_CUSTOM_USERS: appuser
      PGPOOL_POSTGRES_CUSTOM_PASSWORDS: appuserpass
      PGPOOL_ADMIN_USERNAME: admin
      PGPOOL_ADMIN_PASSWORD: adminpass
    ports:
      - "5432:5432"
      - "9898:9898"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ': > /dev/tcp/127.0.0.1/5432'"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pg-ha

  postgres-exporter-node1:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: pg_exporter_node1
    restart: unless-stopped
    depends_on:
      - pg-node-1
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@pg-node-1:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
      - ./monitoring/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    networks:
      - pg-ha

  postgres-exporter-node2:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: pg_exporter_node2
    restart: unless-stopped
    depends_on:
      - pg-node-2
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@pg-node-2:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
      - ./monitoring/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    networks:
      - pg-ha

  postgres-exporter-node3:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: pg_exporter_node3
    restart: unless-stopped
    depends_on:
      - pg-node-3
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@pg-node-3:5432/postgres?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
      - ./monitoring/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    networks:
      - pg-ha

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - postgres-exporter-node1
      - postgres-exporter-node2
      - postgres-exporter-node3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pg-ha

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - pg-ha

volumes:
  node1_data:
  node2_data:
  node3_data:
  prometheus_data:
  grafana_data:

networks:
  pg-ha:
    name: pg_ha_net
