apiVersion: v1
kind: Namespace
metadata:
  name: pg-ha
---
apiVersion: v1
kind: Secret
metadata:
  name: app-user-secret
  namespace: pg-ha
type: kubernetes.io/basic-auth
stringData:
  username: appuser
  password: appuser-pass
---
apiVersion: v1
kind: Secret
metadata:
  name: superuser-secret
  namespace: pg-ha
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-ha-cluster
  namespace: pg-ha
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised
  storage:
    size: 2Gi
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  superuserSecret:
    name: superuser-secret
  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      secret:
        name: app-user-secret
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      wal_level: "replica"
      max_wal_senders: "10"
      max_replication_slots: "10"
  monitoring:
    enablePodMonitor: true
